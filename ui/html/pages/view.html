{{ define "title" }}Snippet #{{ .Snippet.ID }}{{ end }}

{{ define "main" }}
    {{ with .Snippet }}
        <div class="snippet">
            <div class="metadata">
                <strong>{{ .Title }}</strong>
                <span>#{{ .ID }}</span>
            </div>
            <div class="content">
                {{ .Content }}
            </div>
            <div class="metadata">
                <time>Created: {{ .CreatedAt }}</time>
                <time>Expires: {{ .ExpiresAt }}</time>
            </div>
        </div>
    {{ end }}
{{ end }}
